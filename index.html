<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="포켓몬 TCG Pocket 카드 도감 — 카드 검색, 필터, 출현율 확인" />
  <title>포켓몬 TCG Pocket 도감</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════ -->
  <header class="site-header">
    <div class="header-top">
      <!-- Logo -->
      <a class="site-logo" href="/" aria-label="포켓몬 TCG Pocket 도감 홈">
        <img
          src="assets/card-back.png"
          alt="로고"
          class="site-logo-img"
        />
        <span class="site-title">포켓몬 TCG <span>Pocket</span></span>
      </a>

      <!-- Search -->
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input
          type="search"
          id="search-input"
          placeholder="카드 이름 검색..."
          aria-label="카드 이름 검색"
          autocomplete="off"
        />
      </div>

      <!-- Card count -->
      <div class="card-count-wrap">
        <span id="card-count">0</span>장의 카드
      </div>
    </div>

    <!-- Filter rows -->
    <nav class="header-filters" aria-label="카드 필터">

      <!-- Category -->
      <div class="filter-row">
        <span class="filter-label">카테고리</span>
        <button class="filter-btn" data-filter-category="Pokemon"   aria-label="포켓몬 필터">포켓몬</button>
        <button class="filter-btn" data-filter-category="Item"      aria-label="아이템 필터">아이템</button>
        <button class="filter-btn" data-filter-category="Tool"      aria-label="포켓몬의 도구 필터">포켓몬의 도구</button>
        <button class="filter-btn" data-filter-category="Supporter" aria-label="서포트 필터">서포트</button>
        <button class="filter-btn" data-filter-category="Stadium"   aria-label="스타디움 필터">스타디움</button>
      </div>

      <!-- Type -->
      <div class="filter-row">
        <span class="filter-label">타입</span>
        <button class="filter-btn" data-filter-type="Grass"     aria-label="풀 타입 필터"><img class="type-icon-filter" src="assets/types/grass.png" alt="풀"> 풀</button>
        <button class="filter-btn" data-filter-type="Fire"      aria-label="불꽃 타입 필터"><img class="type-icon-filter" src="assets/types/fire.png" alt="불꽃"> 불꽃</button>
        <button class="filter-btn" data-filter-type="Water"     aria-label="물 타입 필터"><img class="type-icon-filter" src="assets/types/water.png" alt="물"> 물</button>
        <button class="filter-btn" data-filter-type="Lightning" aria-label="번개 타입 필터"><img class="type-icon-filter" src="assets/types/lightning.png" alt="번개"> 번개</button>
        <button class="filter-btn" data-filter-type="Psychic"   aria-label="에스퍼 타입 필터"><img class="type-icon-filter" src="assets/types/psychic.png" alt="에스퍼"> 에스퍼</button>
        <button class="filter-btn" data-filter-type="Fighting"  aria-label="격투 타입 필터"><img class="type-icon-filter" src="assets/types/fighting.png" alt="격투"> 격투</button>
        <button class="filter-btn" data-filter-type="Darkness"  aria-label="악 타입 필터"><img class="type-icon-filter" src="assets/types/darkness.png" alt="악"> 악</button>
        <button class="filter-btn" data-filter-type="Metal"     aria-label="강철 타입 필터"><img class="type-icon-filter" src="assets/types/metal.png" alt="강철"> 강철</button>
        <button class="filter-btn" data-filter-type="Dragon"    aria-label="드래곤 타입 필터"><img class="type-icon-filter" src="assets/types/dragon.png" alt="드래곤"> 드래곤</button>
        <button class="filter-btn" data-filter-type="Colorless" aria-label="무색 타입 필터"><img class="type-icon-filter" src="assets/types/colorless.png" alt="무색"> 무색</button>
      </div>

      <!-- Set -->
      <div class="filter-row">
        <span class="filter-label">세트</span>
        <button class="filter-btn" data-filter-set="A1"     aria-label="A1 세트 필터">A1</button>
        <button class="filter-btn" data-filter-set="A1a"    aria-label="A1a 세트 필터">A1a</button>
        <button class="filter-btn" data-filter-set="A2"     aria-label="A2 세트 필터">A2</button>
        <button class="filter-btn" data-filter-set="A2b"    aria-label="A2b 세트 필터">A2b</button>
        <button class="filter-btn" data-filter-set="A3"     aria-label="A3 세트 필터">A3</button>
        <button class="filter-btn" data-filter-set="A3a"    aria-label="A3a 세트 필터">A3a</button>
        <button class="filter-btn" data-filter-set="A4"     aria-label="A4 세트 필터">A4</button>
        <button class="filter-btn" data-filter-set="A4b"    aria-label="A4b 세트 필터">A4b</button>
        <button class="filter-btn" data-filter-set="PROMO-A" aria-label="PROMO-A 세트 필터">PROMO-A</button>
      </div>

      <!-- Rarity -->
      <div class="filter-row">
        <span class="filter-label">희귀도</span>
        <button class="filter-btn" data-filter-rarity="◇"    aria-label="◇ 희귀도 필터">◇</button>
        <button class="filter-btn" data-filter-rarity="◇◇"   aria-label="◇◇ 희귀도 필터">◇◇</button>
        <button class="filter-btn" data-filter-rarity="◇◇◇"  aria-label="◇◇◇ 희귀도 필터">◇◇◇</button>
        <button class="filter-btn" data-filter-rarity="◇◇◇◇" aria-label="◇◇◇◇ 희귀도 필터">◇◇◇◇</button>
        <button class="filter-btn" data-filter-rarity="☆"    aria-label="☆ 희귀도 필터">☆</button>
        <button class="filter-btn" data-filter-rarity="☆☆"   aria-label="☆☆ 희귀도 필터">☆☆</button>
        <button class="filter-btn" data-filter-rarity="☆☆☆"  aria-label="☆☆☆ 희귀도 필터">☆☆☆</button>
        <button class="filter-btn" data-filter-rarity="♛"    aria-label="Crown 희귀도 필터">♛ Crown</button>
      </div>

    </nav>
  </header>

  <!-- ══════════════════════════════════════════
       MAIN — Card grid
  ══════════════════════════════════════════ -->
  <main class="main-content">
    <div id="load-progress" aria-live="polite" aria-label="로딩 진행률">
      <p class="progress-text">카드 로딩 중...</p>
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>
    </div>
    <div id="card-grid" role="list" aria-label="카드 목록"></div>
  </main>

  <!-- ══════════════════════════════════════════
       MODAL
  ══════════════════════════════════════════ -->
  <div
    id="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-label="카드 상세 정보"
  >
    <div id="modal-panel"></div>
  </div>

  <!-- ══════════════════════════════════════════
       SCRIPTS (ES modules)
  ══════════════════════════════════════════ -->
  <script type="module">
    import { init } from './js/cards.js';
    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
